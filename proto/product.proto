syntax = "proto3";
package product;

service ProductService {
  rpc GetProduct        (GetProductRequest)        returns (ProductResponse);
  rpc CheckAvailability (CheckAvailabilityRequest) returns (AvailabilityResponse);
  rpc GetProductsByIds  (GetProductsByIdsRequest)  returns (GetProductsByIdsResponse);
  rpc DecrementStock    (DecrementStockRequest)    returns (DecrementStockResponse);
}

message GetProductRequest   { string id = 1; }

message CheckAvailabilityRequest {
  string productId = 1;
  int32  quantity  = 2;
}

message AvailabilityResponse {
  bool   available    = 1;
  int32  currentStock = 2;
  string message      = 3;
}

message GetProductsByIdsRequest  { repeated string ids = 1; }

message DecrementStockRequest {
  string productId = 1;
  int32  quantity  = 2;
}

message DecrementStockResponse {
  bool  success      = 1;
  int32 updatedStock = 2;
}

message ProductResponse {
  string id          = 1;
  string name        = 2;
  string description = 3;
  string sku         = 4;
  string category    = 5;
  double price       = 6;
  int32  stock       = 7;
  string imageUrl    = 8;
  bool   isActive    = 9;
  string createdAt   = 10;
  string updatedAt   = 11;
}

message GetProductsByIdsResponse { repeated ProductResponse products = 1; }
